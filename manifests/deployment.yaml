apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: rexec
  name: rexec
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rexec
  strategy: {}
  template:
    metadata:
      labels:
        app: rexec
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: rexec-impersonator
      automountServiceAccountToken: true
      containers:
      - image: ghcr.io/adyen/kubectl-rexec:latest
        imagePullPolicy: Always
        name: rexec
        ports:
        - containerPort: 8443
        - containerPort: 9090
        args:
        - --audit-trace
        - --by-pass-user=system:admin
        resources:
          requests:
            ephemeral-storage: "1Gi"
            cpu: 150m
            memory: "128Mi"
          limits:
            ephemeral-storage: "1Gi"
            cpu: 300m
            memory: "256Mi"
        volumeMounts:
        - mountPath: /etc/pki/rexec
          name: rexec-tls
          readOnly: true
      volumes:
      - name: rexec-tls
        secret:
          secretName: rexec-tls
